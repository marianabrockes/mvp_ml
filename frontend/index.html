<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Previsão Salarial — Profissionais de Tecnologia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>💻 Previsão Salarial</h1>
      <p class="subtitulo">
        Descubra em qual faixa salarial você se enquadra com base no seu perfil
      </p>

      <form id="formulario">
        <div class="secao">
          <h2>Perfil</h2>

          <label>Faixa etária</label>
          <select name="idade">
            <option value="0">18-21</option>
            <option value="1">22-24</option>
            <option value="2">25-29</option>
            <option value="3">30-34</option>
            <option value="4">35-39</option>
            <option value="5">40-44</option>
            <option value="6">45-49</option>
            <option value="7">50-54</option>
            <option value="8">55-59</option>
            <option value="9">60+</option>
          </select>

          <label>Gênero</label>
          <select name="genero">
            <option value="0">Feminino</option>
            <option value="1">Masculino</option>
            <option value="2">Outro</option>
            <option value="3">Prefiro não informar</option>
          </select>

          <label>Região</label>
          <select name="regiao">
            <option value="0">África</option>
            <option value="1">América do Norte</option>
            <option value="2">América do Sul</option>
            <option value="3">Ásia</option>
            <option value="4">Europa</option>
            <option value="5">Não informado</option>
            <option value="6">Oceania</option>
          </select>

          <label>Escolaridade</label>
          <select name="escolaridade">
            <option value="0">Ensino médio</option>
            <option value="1">Graduação</option>
            <option value="2">Pós-graduação</option>
            <option value="3">Mestrado</option>
            <option value="4">Doutorado</option>
            <option value="5">Prefiro não informar</option>
          </select>
        </div>

        <div class="secao">
          <h2>Experiência</h2>

          <label>Anos programando</label>
          <select name="anos_programando">
            <option value="0">Nunca programei</option>
            <option value="1">Menos de 1 ano</option>
            <option value="2">1-3 anos</option>
            <option value="3">3-5 anos</option>
            <option value="4">5-10 anos</option>
            <option value="5">10-20 anos</option>
            <option value="6">20+ anos</option>
          </select>

          <label>Anos usando ML</label>
          <select name="anos_usando_ml">
            <option value="0">Não uso ML</option>
            <option value="1">Menos de 1 ano</option>
            <option value="2">1-2 anos</option>
            <option value="3">2-3 anos</option>
            <option value="4">3-4 anos</option>
            <option value="5">4-5 anos</option>
            <option value="6">5-10 anos</option>
            <option value="7">10-20 anos</option>
          </select>
        </div>

        <div class="secao">
          <h2>Linguagens que você usa</h2>
          <div class="checkboxes">
            <label><input type="checkbox" name="lang_python" /> Python</label>
            <label><input type="checkbox" name="lang_r" /> R</label>
            <label><input type="checkbox" name="lang_sql" /> SQL</label>
            <label><input type="checkbox" name="lang_c" /> C</label>
            <label><input type="checkbox" name="lang_cpp" /> C++</label>
            <label><input type="checkbox" name="lang_java" /> Java</label>
            <label
              ><input type="checkbox" name="lang_javascript" />
              JavaScript</label
            >
            <label><input type="checkbox" name="lang_bash" /> Bash</label>
          </div>
        </div>

        <div class="secao">
          <h2>Plataformas de cursos</h2>
          <div class="checkboxes">
            <label
              ><input type="checkbox" name="curso_coursera" /> Coursera</label
            >
            <label><input type="checkbox" name="curso_edx" /> edX</label>
            <label><input type="checkbox" name="curso_kaggle" /> Kaggle</label>
            <label
              ><input type="checkbox" name="curso_datacamp" /> DataCamp</label
            >
            <label><input type="checkbox" name="curso_fastai" /> Fast.ai</label>
            <label
              ><input type="checkbox" name="curso_udacity" /> Udacity</label
            >
            <label><input type="checkbox" name="curso_udemy" /> Udemy</label>
            <label
              ><input type="checkbox" name="curso_linkedin" /> LinkedIn
              Learning</label
            >
            <label
              ><input type="checkbox" name="curso_cloud" /> Cloud
              (AWS/Azure/GCP)</label
            >
            <label
              ><input type="checkbox" name="curso_universidade" />
              Universidade</label
            >
          </div>
        </div>

        <div class="secao">
          <h2>O que foi mais útil para aprender?</h2>
          <div class="checkboxes">
            <label
              ><input type="checkbox" name="util_universidade" />
              Universidade</label
            >
            <label
              ><input type="checkbox" name="util_online" /> Cursos online</label
            >
            <label
              ><input type="checkbox" name="util_social" /> Redes sociais</label
            >
            <label
              ><input type="checkbox" name="util_video" /> Vídeos (YouTube
              etc)</label
            >
            <label><input type="checkbox" name="util_kaggle" /> Kaggle</label>
          </div>
        </div>

        <div class="secao">
          <h2>Frameworks de ML</h2>
          <div class="checkboxes">
            <label
              ><input type="checkbox" name="ml_sklearn" /> Scikit-learn</label
            >
            <label
              ><input type="checkbox" name="ml_tensorflow" /> TensorFlow</label
            >
            <label><input type="checkbox" name="ml_pytorch" /> PyTorch</label>
          </div>
        </div>

        <button type="button" onclick="prever()">
          🔮 Prever faixa salarial
        </button>
      </form>

      <div id="resultado" class="resultado escondido">
        <h2>Resultado</h2>
        <p>Com base no seu perfil, sua faixa salarial estimada é:</p>
        <div id="faixa" class="faixa"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
